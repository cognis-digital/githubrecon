apiVersion: apps/v1
kind: Deployment
metadata: { name: githubrecon, labels: { app: githubrecon } }
spec:
  replicas: 1
  selector: { matchLabels: { app: githubrecon } }
  template:
    metadata: { labels: { app: githubrecon } }
    spec:
      containers:
        - name: githubrecon
          image: ghcr.io/cognis-digital/githubrecon:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: githubrecon }
spec:
  selector: { app: githubrecon }
  ports: [{ port: 80, targetPort: 8000 }]
